<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>型A — 業務ダッシュボード風（モック）</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, "Segoe UI", sans-serif; background: #f1f5f9; color: #0f172a; font-size: 14px; }
    .app { display: flex; min-height: 100vh; }
    .nav {
      width: 180px; background: #0f172a; color: #e2e8f0; padding: 16px 12px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .nav h1 { font-size: 12px; font-weight: 600; letter-spacing: 0.05em; margin: 0 0 12px; color: #94a3b8; text-transform: uppercase; }
    .nav a { color: #cbd5e1; text-decoration: none; padding: 8px 10px; border-radius: 6px; font-size: 13px; }
    .nav a:hover { background: #1e293b; color: #fff; }
    .nav a.active { background: #334155; color: #fff; }
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .topbar {
      background: #fff; border-bottom: 1px solid #e2e8f0; padding: 12px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .topbar span { font-weight: 600; font-size: 15px; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 8px 14px; border-radius: 6px; border: none; cursor: pointer;
      font-size: 13px; font-weight: 500;
    }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-ghost { background: #fff; color: #334155; border: 1px solid #cbd5e1; }
    .content { padding: 20px; flex: 1; }
    .panel { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px 14px; border-bottom: 1px solid #e2e8f0; }
    th { background: #f8fafc; font-size: 12px; color: #64748b; font-weight: 600; }
    tr:hover td { background: #f8fafc; cursor: pointer; }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; background: #e0f2fe; color: #0369a1; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: #475569; margin-bottom: 6px; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; max-width: 480px; padding: 8px 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px;
    }
    .form-group textarea { min-height: 100px; resize: vertical; }
    .actions { display: flex; gap: 10px; margin-top: 20px; }
    .screen { display: none; }
    .screen.active { display: block; }
    .hint { font-size: 11px; color: #64748b; margin-top: 24px; padding: 10px; background: #f8fafc; border-radius: 6px; border: 1px dashed #cbd5e1; }
  </style>
</head>
<body>
  <div class="app">
    <aside class="nav">
      <h1>提出ダッシュ</h1>
      <a href="#" class="active">一覧</a>
      <a href="#">設定</a>
      <a href="#">ヘルプ</a>
    </aside>
    <div class="main">
      <header class="topbar">
        <span id="pageTitle">提出物一覧</span>
        <button type="button" class="btn btn-primary" id="btnAdd" onclick="showDetail(true)">＋ 追加</button>
      </header>
      <div class="content">
        <!-- 画面1: 一覧 -->
        <div id="screen-list" class="screen active">
          <div class="panel">
            <table>
              <thead>
                <tr>
                  <th>課題名</th>
                  <th>期限</th>
                  <th>状態</th>
                </tr>
              </thead>
              <tbody>
                <tr onclick="showDetail(false)">
                  <td>中間レポート（ダミー）</td>
                  <td>5/20</td>
                  <td><span class="badge">未提出</span></td>
                </tr>
                <tr onclick="showDetail(false)">
                  <td>週次振り返り</td>
                  <td>5/18</td>
                  <td><span class="badge">下書き</span></td>
                </tr>
                <tr onclick="showDetail(false)">
                  <td>デモ動画（任意）</td>
                  <td>—</td>
                  <td><span class="badge">—</span></td>
                </tr>
                <tr onclick="showDetail(false)">
                  <td>読書メモ</td>
                  <td>5/25</td>
                  <td><span class="badge">提出済</span></td>
                </tr>
                <tr onclick="showDetail(false)">
                  <td>アンケート回答</td>
                  <td>5/22</td>
                  <td><span class="badge">未提出</span></td>
                </tr>
              </tbody>
            </table>
          </div>
          <p class="hint">※ 行をクリックすると「詳細／編集」に切り替わるイメージ（モック）。右上の追加も同様。</p>
        </div>
        <!-- 画面2: 詳細／編集 -->
        <div id="screen-detail" class="screen">
          <div class="panel" style="padding: 20px;">
            <div class="form-group">
              <label>課題名</label>
              <input type="text" value="中間レポート（ダミー）" readonly />
            </div>
            <div class="form-group">
              <label>提出物 URL（ダミー）</label>
              <input type="text" placeholder="https://..." />
            </div>
            <div class="form-group">
              <label>メモ</label>
              <textarea>ここに複数行のメモが入る想定です。Step2 では保存処理はしません。</textarea>
            </div>
            <div class="actions">
              <button type="button" class="btn btn-primary" onclick="alert('モックのため保存しません')">保存</button>
              <button type="button" class="btn btn-ghost" onclick="showList()">一覧へ戻る</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    function showDetail(isNew) {
      document.getElementById('screen-list').classList.remove('active');
      document.getElementById('screen-detail').classList.add('active');
      document.getElementById('pageTitle').textContent = isNew ? '新規提出' : '提出の編集';
      document.getElementById('btnAdd').style.visibility = 'hidden';
    }
    function showList() {
      document.getElementById('screen-detail').classList.remove('active');
      document.getElementById('screen-list').classList.add('active');
      document.getElementById('pageTitle').textContent = '提出物一覧';
      document.getElementById('btnAdd').style.visibility = 'visible';
    }
  </script>
</body>
</html>
