<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>型D — 2ステップウィザード（モック）</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: #eef2ff; font-family: system-ui, sans-serif; color: #1e1b4b;
    }
    .shell { max-width: 440px; margin: 0 auto; min-height: 100vh; padding: 28px 20px 48px; }
    .steps {
      display: flex; align-items: center; gap: 8px; margin-bottom: 28px; font-size: 13px; font-weight: 600;
    }
    .steps .dot {
      width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      background: #c7d2fe; color: #312e81;
    }
    .steps .dot.on { background: #4f46e5; color: #fff; }
    .steps .line { flex: 1; height: 2px; background: #c7d2fe; }
    .screen { display: none; }
    .screen.active { display: block; }
    .card {
      background: #fff; border-radius: 16px; padding: 24px; box-shadow: 0 12px 40px -16px rgba(67, 56, 202, 0.35);
      border: 1px solid #e0e7ff;
    }
    h2 { margin: 0 0 6px; font-size: 20px; }
    .lead { font-size: 13px; color: #6366f1; margin: 0 0 20px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #4338ca; margin-bottom: 6px; }
    input, select, textarea {
      width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #c7d2fe; font-size: 14px; margin-bottom: 14px; font-family: inherit;
    }
    textarea { min-height: 72px; resize: vertical; }
    .btn-row { display: flex; gap: 10px; margin-top: 8px; }
    button {
      flex: 1; padding: 12px 14px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; font-size: 14px;
    }
    .btn-next { background: #4f46e5; color: #fff; }
    .btn-back { background: #e0e7ff; color: #312e81; }
    .summary { background: #f5f3ff; border-radius: 12px; padding: 16px; font-size: 14px; line-height: 1.65; border: 1px solid #ddd6fe; margin-bottom: 16px; }
    .summary dt { font-size: 11px; color: #6d28d9; font-weight: 700; margin-top: 10px; }
    .summary dt:first-child { margin-top: 0; }
    .summary dd { margin: 4px 0 0; color: #1e1b4b; }
    .hint { font-size: 11px; color: #6366f1; margin-top: 20px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="steps" aria-hidden="true">
      <span class="dot on" id="d1">1</span>
      <span class="line"></span>
      <span class="dot" id="d2">2</span>
    </div>
    <!-- Step 1 -->
    <div id="step1" class="screen active">
      <div class="card">
        <h2>イベントに申し込む</h2>
        <p class="lead">Step 1 / 2 — 入力（ダミーフォーム）</p>
        <label>お名前</label>
        <input type="text" value="ダミー 太郎" />
        <label>参加枠</label>
        <select>
          <option>オンライン</option>
          <option>オフライン</option>
        </select>
        <label>一言メッセージ</label>
        <textarea>よろしくお願いします（ダミー）</textarea>
        <div class="btn-row">
          <button type="button" class="btn-back" disabled style="opacity:0.5">戻る</button>
          <button type="button" class="btn-next" onclick="go2()">次へ</button>
        </div>
      </div>
      <p class="hint">型D：進行表示（1→2）が主役。バリデーションはモックでは不要。</p>
    </div>
    <!-- Step 2 -->
    <div id="step2" class="screen">
      <div class="card">
        <h2>内容の確認</h2>
        <p class="lead">Step 2 / 2 — 要約してから確定</p>
        <dl class="summary">
          <dt>お名前</dt>
          <dd>ダミー 太郎</dd>
          <dt>参加枠</dt>
          <dd>オンライン</dd>
          <dt>一言</dt>
          <dd>よろしくお願いします（ダミー）</dd>
        </dl>
        <div class="btn-row">
          <button type="button" class="btn-back" onclick="go1()">戻る</button>
          <button type="button" class="btn-next" onclick="alert('モックのため送信しません')">確定する</button>
        </div>
      </div>
    </div>
  </div>
  <script>
    function go2() {
      document.getElementById('step1').classList.remove('active');
      document.getElementById('step2').classList.add('active');
      document.getElementById('d1').classList.remove('on');
      document.getElementById('d2').classList.add('on');
    }
    function go1() {
      document.getElementById('step2').classList.remove('active');
      document.getElementById('step1').classList.add('active');
      document.getElementById('d2').classList.remove('on');
      document.getElementById('d1').classList.add('on');
    }
  </script>
</body>
</html>
